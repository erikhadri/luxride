<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://unpkg.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https: http:;
        connect-src 'self';
    ">
    <title>Luxride - Log In</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overscroll-behavior: none;
            background: linear-gradient(135deg, #f5f7fa, #e4e7eb);
            color: #333333;
            position: relative;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: transparent;
        }

        .btn-primary {
            background: linear-gradient(90deg, #d4af37, #b8972e);
            transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(90deg, #e6c14b, #d4af37);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            padding: 14px 16px;
            transition: all 0.3s ease;
            color: #333333;
        }

        .input-field:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.3), 0 0 20px rgba(0, 0, 0, 0.1);
            transform: translateY(-1px);
        }

        .form-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1), 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            border-left: 4px solid #d4af37;
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            height: 4px;
            background: linear-gradient(90deg, #d4af37, #b8972e);
            z-index: 1;
        }

        .checkbox-container {
            position: relative;
            transition: all 0.2s ease;
        }

        .checkbox-container:hover {
            transform: translateX(2px);
        }

        .link-hover {
            position: relative;
            transition: color 0.3s ease;
            color: #666666;
        }

        .link-hover:hover {
            color: #d4af37;
        }

        .link-hover::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            left: 0;
            background-color: #d4af37;
            transition: width 0.3s ease;
        }

        .link-hover:hover::after {
            width: 100%;
        }

        .message-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #ffffff;
            border: none;
        }

        .message-error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #ffffff;
            border: none;
        }

        .message-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #ffffff;
            border: none;
        }

        .welcome-text {
            font-family: 'Playfair Display', serif;
            color: #333333;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spinner {
            display: none;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #d4af37;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 640px) {
            .form-container {
                padding: 16px;
                margin: 16px;
            }
            .input-field {
                padding: 12px 14px;
            }
            .btn-primary {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    <!-- Particle Background -->
    <div id="particles-js"></div>

    <!-- Header -->
    <header class="w-full sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <h1 class="text-2xl font-extrabold text-gray-800 tracking-tight" style="font-family: 'Playfair Display', serif;">Luxride</h1>
            </div>
            <div class="flex items-center space-x-4">
                <a href="index.html" class="font-medium text-base link-hover">Back to Home</a>
                <a href="signup.html" class="px-4 py-2 rounded-full font-medium btn-primary text-base">Sign up</a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="p-8 max-w-md w-full mt-20 form-container fade-in">
        <div class="relative z-10">
            <h2 class="text-3xl font-bold mb-2 text-center text-gray-800" style="font-family: 'Playfair Display', serif;">Welcome Back</h2>
            <p class="text-center text-gray-600 mb-6 welcome-text text-sm">Sign in to continue your premium journey</p>
            
            <form id="login-form" class="space-y-5" aria-label="Login Form">
                <div class="relative">
                    <label for="email" class="sr-only">Email Address or Phone</label>
                    <input type="email" id="email" placeholder="Enter your email or phone" class="w-full input-field text-base" required aria-required="true" autocomplete="email">
                    <i class="fas fa-envelope absolute top-4 left-4 text-gray-400 transition-colors duration-200"></i>
                </div>
                
                <div class="relative">
                    <label for="password" class="sr-only">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" class="w-full input-field text-base" required aria-required="true" minlength="6" autocomplete="current-password">
                    <i class="fas fa-lock absolute top-4 left-4 text-gray-400 transition-colors duration-200"></i>
                    <button type="button" id="toggle-password" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition-colors duration-200" aria-label="Toggle password visibility">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                
                <div class="flex items-center justify-between pt-2">
                    <label class="flex items-center space-x-2 text-sm text-gray-600 checkbox-container">
                        <input type="checkbox" id="remember-me" class="h-4 w-4 text-[#d4af37] focus:ring-[#d4af37] border-gray-300 rounded transition-all duration-200 transform scale-120" autocomplete="off">
                        <span class="cursor-pointer select-none">Remember Me</span>
                    </label>
                    <a href="forgot-password.html" class="text-sm font-medium link-hover">Forgot Password?</a>
                </div>
                
                <button type="submit" id="login-button" class="w-full py-4 rounded-xl font-semibold btn-primary text-lg flex items-center justify-center group disabled:opacity-50 disabled:cursor-not-allowed">
                    <span class="mr-2" id="button-text">Log In</span>
                    <span id="spinner" class="spinner group-disabled:opacity-100"></span>
                    <i class="fas fa-arrow-right ml-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></i>
                </button>
            </form>
            
            <div id="login-message" class="mt-4 p-3 rounded-lg hidden text-sm font-medium text-center"></div>
            
            <p class="mt-6 text-center text-gray-600 text-sm">
                Don't have an account? <a href="signup.html" class="font-semibold link-hover">Create one now</a>
            </p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-12 text-center text-gray-600 pb-8 w-full">
        <div class="container mx-auto px-4 max-w-md">
            <div class="grid grid-cols-1 gap-6 text-center">
                <div>
                    <h4 class="text-lg font-bold mb-3" style="font-family: 'Playfair Display', serif;">Luxride</h4>
                    <ul class="space-y-2 text-sm">
                        <li><a href="about.html" class="hover:underline link-hover">About us</a></li>
                        <li><a href="careers.html" class="hover:underline link-hover">Careers</a></li>
                        <li><a href="newsroom.html" class="hover:underline link-hover">Newsroom</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-lg font-bold mb-3" style="font-family: 'Playfair Display', serif;">Support</h4>
                    <ul class="space-y-2 text-sm">
                        <li><a href="support.html" class="hover:underline link-hover">Help Center</a></li>
                        <li><a href="contact.html" class="hover:underline link-hover">Contact us</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-lg font-bold mb-3" style="font-family: 'Playfair Display', serif;">Follow us</h4>
                    <div class="flex space-x-4 justify-center">
                        <a href="#" class="hover:text-[#d4af37]"><i class="fab fa-facebook-f text-lg"></i></a>
                        <a href="#" class="hover:text-[#d4af37]"><i class="fab fa-twitter text-lg"></i></a>
                        <a href="#" class="hover:text-[#d4af37]"><i class="fab fa-instagram text-lg"></i></a>
                    </div>
                </div>
            </div>
            <div class="mt-6 text-center text-sm text-gray-600">
                <p>&copy; 2025 Luxride Technologies Inc. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Particle Background Initialization
        particlesJS('particles-js', {
            particles: {
                number: { value: 50, density: { enable: true, value_area: 1000 } },
                color: { value: ['#d4af37', '#3b82f6', '#ffffff', '#b8972e'] },
                shape: { 
                    type: 'circle', 
                    stroke: { width: 2, color: '#d4af37' },
                    polygon: { nb_sides: 5 }
                },
                opacity: { 
                    value: 0.6, 
                    random: true, 
                    anim: { 
                        enable: true, 
                        speed: 1.5, 
                        opacity_min: 0.2, 
                        sync: false 
                    }
                },
                size: { 
                    value: 20, 
                    random: true, 
                    anim: { 
                        enable: true, 
                        speed: 5, 
                        size_min: 5, 
                        sync: false 
                    }
                },
                line_linked: { 
                    enable: true, 
                    distance: 150, 
                    color: '#d4af37', 
                    opacity: 0.3, 
                    width: 1 
                },
                move: { 
                    enable: true, 
                    speed: 4, 
                    direction: 'none', 
                    random: true, 
                    straight: false, 
                    out_mode: 'bounce', 
                    bounce: true, 
                    attract: { 
                        enable: false, 
                        rotateX: 600, 
                        rotateY: 1200 
                    }
                }
            },
            interactivity: {
                detect_on: 'canvas',
                events: { 
                    onhover: { enable: true, mode: 'grab' }, 
                    onclick: { enable: true, mode: 'push' }, 
                    resize: true 
                },
                modes: { 
                    grab: { distance: 200, line_linked: { opacity: 0.5 } },
                    push: { particles_nb: 3 },
                    repulse: { distance: 100, duration: 0.4 }
                }
            },
            retina_detect: true
        });

        // Initialize elements
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginForm = document.getElementById('login-form');
        const loginMessage = document.getElementById('login-message');
        const loginButton = document.getElementById('login-button');
        const buttonText = document.getElementById('button-text');
        const spinner = document.getElementById('spinner');
        const rememberMe = document.getElementById('remember-me');

        // Sanitize HTML
        function sanitizeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Check if user is already logged in
        window.addEventListener('load', () => {
            const loggedInUser = localStorage.getItem('luxride_logged_in');
            const remember = localStorage.getItem('luxride_remember');
            
            if (loggedInUser && remember === 'true') {
                try {
                    const user = JSON.parse(loggedInUser);
                    showMessage(`Welcome back, ${sanitizeHTML(user.name)}! Auto-logging in...`, 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } catch (e) {
                    localStorage.removeItem('luxride_logged_in');
                    localStorage.removeItem('luxride_remember');
                }
            }
        });

        // Form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const emailOrPhone = emailInput.value.trim();
            const password = passwordInput.value;
            
            hideMessage();
            
            if (!emailOrPhone || !password) {
                showMessage('Please fill in all fields.', 'error');
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailOrPhone) && emailOrPhone.replace(/\D/g, '').length !== 10) {
                showMessage('Please enter a valid email address or 10-digit phone number.', 'error');
                emailInput.focus();
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters long.', 'error');
                passwordInput.focus();
                return;
            }

            let users;
            try {
                users = JSON.parse(localStorage.getItem('luxride_users')) || [];
            } catch (e) {
                showMessage('Error loading user data. Please try again.', 'error');
                return;
            }

            if (users.length === 0) {
                showMessage('No accounts found. Please <a href="signup.html" class="text-white underline font-medium">create an account</a> first.', 'warning');
                return;
            }

            let user = null;
            const cleanInput = emailOrPhone.replace(/\D/g, '');
            
            if (emailRegex.test(emailOrPhone)) {
                user = users.find(u => u.email && u.email.toLowerCase() === emailOrPhone.toLowerCase());
            } else if (cleanInput.length === 10) {
                const formattedPhone = `+1${cleanInput}`;
                user = users.find(u => u.phone === formattedPhone);
            }

            if (!user) {
                showMessage('Account not found. Please check your credentials or <a href="signup.html" class="text-white underline font-medium">sign up</a>.', 'error');
                return;
            }

            if (user.password !== password) {
                showMessage('Incorrect password. Please try again.', 'error');
                passwordInput.value = '';
                passwordInput.focus();
                return;
            }

            loginButton.disabled = true;
            spinner.style.display = 'inline-block';
            buttonText.textContent = 'Signing In...';
            loginButton.classList.add('opacity-50', 'cursor-not-allowed');

            setTimeout(() => {
                try {
                    user.verified = true;
                    localStorage.setItem('luxride_logged_in', JSON.stringify(user));
                    
                    if (rememberMe.checked) {
                        localStorage.setItem('luxride_remember', 'true');
                        const expiration = new Date();
                        expiration.setDate(expiration.getDate() + 30);
                        localStorage.setItem('luxride_remember_expires', expiration.toISOString());
                    } else {
                        localStorage.setItem('luxride_remember', 'false');
                        localStorage.removeItem('luxride_remember_expires');
                    }

                    user.lastLogin = new Date().toISOString();
                    user.loginCount = (user.loginCount || 0) + 1;
                    
                    const userIndex = users.findIndex(u => u.id === user.id);
                    if (userIndex !== -1) {
                        users[userIndex] = user;
                        localStorage.setItem('luxride_users', JSON.stringify(users));
                    }

                    const loginType = emailRegex.test(emailOrPhone) ? 'email' : 'phone';
                    showMessage(
                        `Welcome${user.loginCount > 1 ? ` back` : ''}, ${sanitizeHTML(user.name)}! Using your ${loginType === 'email' ? 'email' : 'phone number'}. Redirecting to dashboard...`, 
                        'success'
                    );
                    
                    setTimeout(() => {
                        hideMessage();
                        window.location.href = 'index.html';
                    }, 2000);
                    
                } catch (error) {
                    console.error('Login error:', error);
                    showMessage('An error occurred during login. Please try again.', 'error');
                    resetLoginButton();
                }
            }, 1500);
        });

        // Enhanced showMessage function
        function showMessage(text, type) {
            loginMessage.innerHTML = text;
            loginMessage.classList.remove('hidden', 'message-success', 'message-error', 'message-warning');
            
            if (type === 'error') {
                loginMessage.classList.add('message-error');
            } else if (type === 'success') {
                loginMessage.classList.add('message-success');
            } else if (type === 'warning') {
                loginMessage.classList.add('message-warning');
            }
            
            if (type === 'error' || type === 'warning') {
                setTimeout(() => {
                    hideMessage();
                }, 5000);
            }
        }

        function hideMessage() {
            loginMessage.classList.add('hidden');
            loginMessage.classList.remove('message-error', 'message-success', 'message-warning');
        }

        function resetLoginButton() {
            loginButton.disabled = false;
            spinner.style.display = 'none';
            buttonText.textContent = 'Log In';
            loginButton.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        // Toggle password visibility
        document.getElementById('toggle-password').addEventListener('click', () => {
            const passwordField = passwordInput;
            const toggleIcon = document.getElementById('toggle-password').querySelector('i');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordField.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        });

        // Real-time email/phone validation
        emailInput.addEventListener('blur', (e) => {
            const inputValue = e.target.value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const cleanPhone = inputValue.replace(/\D/g, '');
            
            if (inputValue && !emailRegex.test(inputValue) && cleanPhone.length !== 10) {
                showMessage('Please enter a valid email address or 10-digit phone number.', 'error');
            }
        });

        // Real-time account existence check
        emailInput.addEventListener('blur', async (e) => {
            const inputValue = e.target.value.trim();
            if (!inputValue) return;
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const cleanPhone = inputValue.replace(/\D/g, '');
            
            if (!emailRegex.test(inputValue) && cleanPhone.length !== 10) return;
            
            try {
                const users = JSON.parse(localStorage.getItem('luxride_users')) || [];
                let user = null;
                
                if (emailRegex.test(inputValue)) {
                    user = users.find(u => u.email && u.email.toLowerCase() === inputValue.toLowerCase());
                } else if (cleanPhone.length === 10) {
                    const formattedPhone = `+1${cleanPhone}`;
                    user = users.find(u => u.phone === formattedPhone);
                }
                
                if (!user) {
                    showMessage('Account not found. <a href="signup.html" class="text-white underline font-medium">Create an account?</a>', 'warning');
                }
            } catch (e) {
                console.error('Error checking account:', e);
            }
        });

        // Password strength indicator
        passwordInput.addEventListener('input', () => {
            if (passwordInput.value.length > 0 && passwordInput.value.length < 6) {
                showMessage('Password must be at least 6 characters long.', 'warning');
            }
        });

        // Input focus animations
        document.querySelectorAll('.input-field').forEach(input => {
            input.addEventListener('focus', function() {
                const icon = this.parentElement.querySelector('i:not(.fa-eye):not(.fa-eye-slash)');
                if (icon) {
                    icon.style.color = '#d4af37';
                }
                hideMessage();
            });
            
            input.addEventListener('blur', function() {
                const icon = this.parentElement.querySelector('i:not(.fa-eye):not(.fa-eye-slash)');
                if (icon) {
                    icon.style.color = '#9ca3af';
                }
            });
        });

        // Form validation for button state
        function validateForm() {
            const inputValue = emailInput.value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const cleanPhone = inputValue.replace(/\D/g, '');
            
            const emailOrPhoneValid = emailRegex.test(inputValue) || cleanPhone.length === 10;
            const passwordValid = passwordInput.value.length >= 6;
            
            if (emailOrPhoneValid && passwordValid) {
                loginButton.disabled = false;
                loginButton.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                loginButton.disabled = true;
                loginButton.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        emailInput.addEventListener('input', validateForm);
        passwordInput.addEventListener('input', validateForm);

        validateForm();

        // Enhanced keyboard navigation
        loginForm.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && loginButton.disabled) {
                e.preventDefault();
            }
        });

        // Click outside message to dismiss
        document.addEventListener('click', (e) => {
            const message = document.getElementById('login-message');
            if (e.target.closest('#login-message') && 
                message.classList.contains('message-success') && 
                !message.textContent.includes('Redirecting')) {
                hideMessage();
            }
        });

        // Prevent form submission on Enter when button is disabled
        loginForm.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && loginButton.disabled) {
                e.preventDefault();
            }
        });

        // Clear localStorage on manual logout
        window.addEventListener('beforeunload', () => {
            const remember = localStorage.getItem('luxride_remember');
            if (remember !== 'true') {
                localStorage.removeItem('luxride_logged_in');
            }
        });
    </script>
</body>
</html>
